    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        .calc-wrapper {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            color: #333;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .range-section { margin-bottom: 30px; text-align: center; }
        
        select {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid var(--accent);
            width: 100%;
            max-width: 400px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .service-box {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .service-box input {
            position: absolute;
            opacity: 0;
        }

        .service-box:hover { border-color: var(--accent); }

        .service-box.active {
            border-color: var(--accent);
            background-color: #ebf5fb;
        }

        .service-label { font-weight: 600; font-size: 14px; margin-bottom: 5px; }
        .service-price { color: var(--success); font-weight: bold; }

        .total-display {
            background: var(--primary);
            color: white;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
        }
        .total-amount { font-size: 1.8rem; font-weight: bold; }
    </style>
</head>

            <option value="4">200 - 250</option>
            <option value="5">250 - 300</option>
            <option value="6">300 - 350</option>
            <option value="7">350 - 400</option>
        </select>
    </div>
