<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBRRM Financial Services | Professional Accounting & Tax Experts</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --dark-blue: #001f3f;
            --accent-gold: #c5a059;
            --gold-hover: #a88545;
            --light-blue: #e6f0fa;
            --white: #ffffff;
            --text-dark: #1a1a1a;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f8fafc; 
            color: var(--text-dark); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Header & Navigation --- */
        header { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 6%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(0, 31, 63, 0.1);
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }

        .logo { text-decoration: none; display: flex; flex-direction: column; }
        .logo-text { font-size: 30px; font-weight: 800; color: var(--dark-blue); letter-spacing: -1px; line-height: 1; }
        .logo-sub { font-size: 10px; color: var(--accent-gold); letter-spacing: 4px; font-weight: 600; text-transform: uppercase; margin-top: 4px; }

        .nav-links { display: flex; list-style: none; gap: 30px; align-items: center; }
        .nav-links a { 
            text-decoration: none; 
            color: var(--dark-blue); 
            font-weight: 500; 
            font-size: 15px; 
            transition: var(--transition);
            position: relative;
        }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px;
            background: var(--accent-gold); transition: var(--transition);
        }
        .nav-links a:hover { color: var(--accent-gold); }
        .nav-links a:hover::after { width: 100%; }

        /* --- Dropdown Modernization --- */
        .dropdown { position: relative; }
        .dropbtn { 
            background: none; border: none; font-family: inherit; font-weight: 500; 
            font-size: 15px; color: var(--dark-blue); cursor: pointer; padding: 10px 0; 
        }
        .dropdown-content { 
            display: none; position: absolute; background: var(--white); 
            min-width: 240px; box-shadow: 0 15px 40px rgba(0,0,0,0.12); 
            border-radius: 12px; top: 110%; left: -20px; padding: 10px 0;
            border-top: 3px solid var(--accent-gold);
            animation: fadeIn 0.3s ease;
        }
        .dropdown-content a { 
            color: var(--text-dark); padding: 12px 25px; display: block; 
            font-size: 14px; border-bottom: none;
        }
        .dropdown-content a:hover { background: var(--light-blue); color: var(--dark-blue); padding-left: 30px; }
        .dropdown:hover .dropdown-content { display: block; }

        /* --- Hero Section (Premium Look) --- */
        .hero { 
            background: linear-gradient(rgba(0,31,63,0.85), rgba(0,31,63,0.85)), 
                        url('https://images.unsplash.com/photo-1454165833767-027ffea9e787?auto=format&fit=crop&w=1920&q=80'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            padding: 140px 8%; color: var(--white); min-height: 85vh; 
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .hero-content { max-width: 900px; }
        .hero h1 { 
            font-size: 4rem; line-height: 1.1; margin-bottom: 25px; font-weight: 700; 
            letter-spacing: -1px;
        }
        .hero h1 span { color: var(--accent-gold); text-shadow: 2px 2px 0px rgba(0,0,0,0.2); }
        .hero p { font-size: 1.25rem; margin-bottom: 40px; opacity: 0.9; max-width: 700px; margin-left: auto; margin-right: auto; font-weight: 300; }
        
        /* --- Buttons --- */
        .btn-primary { 
            background: var(--accent-gold); color: white; padding: 16px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: 600; 
            display: inline-block; transition: var(--transition);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
            text-transform: uppercase; letter-spacing: 1px; font-size: 14px;
        }
        .btn-primary:hover { 
            background: var(--gold-hover); transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(197, 160, 89, 0.4); 
        }

        .mobile-menu-btn { display: none; font-size: 28px; background: none; border: none; color: var(--dark-blue); cursor: pointer; }

        /* --- WhatsApp Float --- */
        .whatsapp-float { 
            position: fixed; bottom: 30px; right: 30px; background: #25d366; 
            color: white; padding: 15px 28px; border-radius: 50px; 
            text-decoration: none; z-index: 2000; font-weight: 600;
            display: flex; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3); transition: var(--transition);
        }
        .whatsapp-float:hover { transform: scale(1.05) translateY(-5px); background: #1da851; }

        /* --- Responsive Design --- */
        @media (max-width: 1024px) {
            .hero h1 { font-size: 3rem; }
            .nav-links { gap: 15px; }
        }

        @media (max-width: 768px) {
            header { padding: 15px 5%; }
            .mobile-menu-btn { display: block; }
            .nav-links {
                display: none; flex-direction: column; position: absolute;
                top: 100%; left: 0; width: 100%; background: var(--white);
                padding: 40px 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                gap: 25px; text-align: center; border-top: 1px solid #eee;
            }
            .nav-links.active { display: flex; animation: slideInDown 0.4s ease; }
            .hero h1 { font-size: 2.5rem; }
            .hero p { font-size: 1rem; }
            .btn-primary { width: 100%; }
            .dropdown-content { position: static; box-shadow: none; width: 100%; display: block; background: transparent; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">
        <div class="logo-text">DBRRM</div>
        <div class="logo-sub">FINANCIAL SERVICES</div>
    </a>

    <button class="mobile-menu-btn" onclick="toggleMenu()">
        <i class="fas fa-bars-staggered"></i>
    </button>
