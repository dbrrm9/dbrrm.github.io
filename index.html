<!DOCTYPE html>

    <style>
        /* Theme: Dark Blue, White, and Black */
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; color: #333; }
        header { background-color: #001f3f; color: white; padding: 20px; text-align: center; }
        h1 { margin: 0; font-size: 2.5em; letter-spacing: 2px; }

        .navbar { background-color: #000; overflow: hidden; display: flex; justify-content: center; }
        .navbar a, .dropbtn { color: white; padding: 14px 20px; text-decoration: none; text-align: center; display: inline-block; }
        .navbar a:hover, .dropdown:hover .dropbtn { background-color: #004080; }

        /* Dropdown for Services */
        .dropdown { display: inline-block; }
        .dropdown-content { display: none; position: absolute; background-color: #fff; min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 1; }
        .dropdown-content a { color: black; padding: 12px 16px; text-decoration: none; display: block; text-align: left; border-bottom: 1px solid #ddd; }
        .dropdown-content a:hover { background-color: #f1f1f1; color: #001f3f; }
        .dropdown:hover .dropdown-content { display: block; }

        .content { padding: 50px; text-align: center; background-color: white; margin: 20px auto; max-width: 1000px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
